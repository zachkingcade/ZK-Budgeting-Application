spring:
  application:
    name: ledger-service
  datasource:
    url: ${POSTGRES_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${POSTGRES_DATASOURCE_USERNAME:postgres}
    password: ${POSTGRES_DATASOURCE_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        default_schema: ledger
    hibernate:
      ddl-auto: validate
    flyway:
      schemas: ledger
      default-schema: ledger
      create-schemas: false

server:
  port: 8081

# Browser clients (e.g. Angular ng serve on :4200) need explicit CORS when calling this API directly.
ledger:
  cors:
    allowed-origins: ${LEDGER_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  outbound:
    user-service-base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}