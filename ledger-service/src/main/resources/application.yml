spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:postgresql://localhost:5432/budgeting?currentSchema=ledger
    username: ledger_svc
    password: ledger_svc
  jpa:
    properties:
      hibernate:
        default_schema: ledger
    hibernate:
      ddl-auto: validate
    flyway:
      schemas: ledger
      default-schema: ledger
      create-schemas: false

spring.autoconfigure.exclude:
  - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

server:
  port: 8081

# Browser clients (e.g. Angular ng serve on :4200) need explicit CORS when calling this API directly.
ledger:
  cors:
    allowed-origins: "http://localhost:4200,http://127.0.0.1:4200"