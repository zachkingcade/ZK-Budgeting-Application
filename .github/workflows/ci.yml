name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  backend:
    name: Backend build and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - ledger-service
          - reporting-service

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-interface-service

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: user-interface-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: false

      - name: Build app
        run: npm run build

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build user-service image
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: false

      - name: Build ledger-service image
        uses: docker/build-push-action@v6
        with:
          context: ./ledger-service
          push: false

      - name: Build reporting-service image
        uses: docker/build-push-action@v6
        with:
          context: ./reporting-service
          push: false

      - name: Build UI image
        uses: docker/build-push-action@v6
        with:
          context: ./user-interface-service
          push: false