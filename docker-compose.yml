services:
  postgres:
    image: postgres:16
    container_name: budgeting-postgres
    environment:
      POSTGRES_DB: budgeting
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - budgeting_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d budgeting"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  budgeting_pgdata: