spring:
  application:
    name: user-service
  datasource:
    url: ${POSTGRES_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ledger}
    username: ${POSTGRES_DATASOURCE_USERNAME:postgres}
    password: ${POSTGRES_DATASOURCE_PASSWORD:postgres}
  jpa:
    properties:
      hibernate:
        default_schema: auth
    hibernate:
      ddl-auto: validate
    flyway:
      schemas: auth
      default-schema: auth
      create-schemas: false

spring.autoconfigure.exclude:
  - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

server:
  port: 8082

# Browser clients (e.g. Angular ng serve on :4200) need explicit CORS when calling this API directly.
user:
  cors:
    allowed-origins: ${LEDGER_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  outbound:
    ledger-service-base-url: ${LEDGER_SERVICE_BASE_URL:http://localhost:8081}
    reporting-service-base-url: ${REPORTING_SERVICE_BASE_URL:http://localhost:8083}

app:
  security:
    private-key: ${PRIVATE_KEY}